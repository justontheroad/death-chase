<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Rotating Blade Weapon -->
  <rect x="0" y="0" width="64" height="64" fill="#2c1a0f" opacity="0"/>
  <!-- Blade body -->
  <rect x="28" y="8" width="8" height="48" fill="#c0c0c0" rx="2"/>
  <!-- Blade edge highlight -->
  <rect x="28" y="8" width="2" height="48" fill="#ffffff" opacity="0.3"/>
  <!-- Blade tip -->
  <polygon points="28,8 36,8 32,4" fill="#c0c0c0"/>
  <!-- Handle -->
  <rect x="26" y="52" width="12" height="8" fill="#8b4513" rx="1"/>
  <!-- Blood groove (optional) -->
  <rect x="31" y="12" width="2" height="40" fill="#000000" opacity="0.2"/>
</svg>