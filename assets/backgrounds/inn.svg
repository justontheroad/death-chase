<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- Inn Background (客栈) -->
  <rect width="800" height="600" fill="#f5deb3"/>
  <!-- Sky -->
  <rect width="800" height="200" fill="#87ceeb"/>
  <!-- Ground/street -->
  <rect y="200" width="800" height="400" fill="#d2b48c"/>
  <!-- Inn building -->
  <rect x="200" y="100" width="400" height="300" fill="#cd853f"/>
  <!-- Roof -->
  <polygon points="180,100 620,100 600,80 200,80" fill="#8b4513"/>
  <!-- Windows -->
  <rect x="250" y="150" width="40" height="50" fill="#87ceeb"/>
  <rect x="350" y="150" width="40" height="50" fill="#87ceeb"/>
  <rect x="450" y="150" width="40" height="50" fill="#87ceeb"/>
  <rect x="550" y="150" width="40" height="50" fill="#87ceeb"/>
  <!-- Door -->
  <rect x="380" y="250" width="40" height="100" fill="#654321"/>
  <!-- Signboard -->
  <rect x="350" y="80" width="100" height="20" fill="#8b4513"/>
  <text x="400" y="95" font-family="serif" font-size="14" fill="white" text-anchor="middle">客栈</text>
  <!-- Tables and chairs outside -->
  <rect x="300" y="350" width="30" height="20" fill="#8b4513"/>
  <rect x="305" y="370" width="5" height="30" fill="#8b4513"/>
  <rect x="320" y="370" width="5" height="30" fill="#8b4513"/>
</svg>